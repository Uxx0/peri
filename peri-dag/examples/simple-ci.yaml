# 简单 CI Pipeline：引用 setup.yml + agent 审查
# 用法: peri-dag --workflow-dir examples/

name: simple-ci
version: "1.0"
description: "Build, test, deploy pipeline for a Rust project"

references:
  setup: "./setup.yml"

defaults:
  retry: 1
  timeout: 120

env:
  RUST_BACKTRACE: "1"

nodes:
  # 引用 setup 子 workflow（包含 shell_test 节点）
  # 展开后生成: do-setup/shell_test
  - id: do-setup
    type: reference
    ref: setup

  # Agent: wraps acpx CLI
  - id: review
    type: agent
    prompt: "test read and write tools"
    agent: ccb
    model: haiku
    depends: [do-setup]
